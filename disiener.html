<button id="saveBtn">Enregistrer</button>

    <br>
    <label for="input_nom_emoji">Entrez un nom pour l'émoji :</label>
    <input name="input_nom_emoji" type="search" placeholder="Définissez un nom" id="input_nom_emoji" width="300" value="">
<script>
  const canvas = document.getElementById('emojiCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  // Fonction pour commencer à dessiner
  canvas.addEventListener('mousedown', () => {
    drawing = true;
  });

  // Fonction pour arrêter de dessiner
  canvas.addEventListener('mouseup', () => {
    drawing = false;
  });

  // Dessiner lorsque la souris bouge
  canvas.addEventListener('mousemove', (e) => {
    if (drawing) {
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#000';

      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }
  });

  // Effacer le dessin
  document.getElementById('clearBtn').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // Enregistrer le dessin
  document.getElementById('saveBtn').addEventListener('click', () => {
    const nom_emoji = document.getElementById('input_nom_emoji').value;
    const dataURL = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.href = dataURL;
    link.download = [nom_emoji, ' -- emoji_Designer-Emojiperso.com.png'];
    link.click();
    alert([nom_emoji, " a bien été enregistrer"]);
  });

  // Optionnel : dessiner un émoji de base
  function dessinerEmojiDeBase() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Visage
    ctx.beginPath();
    ctx.arc(150, 150, 100, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe600';
    ctx.fill();
    ctx.stroke();

    // Yeux
    ctx.beginPath();
    ctx.arc(110, 130, 15, 0, Math.PI * 2);
    ctx.arc(190, 130, 15, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();

    // Sourire
    ctx.beginPath();
    ctx.arc(150, 180, 50, 0, Math.PI);
    ctx.stroke();
  }

dessinerEmojiDeBase();

</script>

</body>
