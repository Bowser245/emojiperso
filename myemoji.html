<body>
    <audio preload="auto" autoplay="autoplay" loop="loop">
        <source src="musique-nous-sommes-les-patates.mp3" type="audio/mp3">
        <source src="musique-nous-sommes-les-patates.ogg" type="audio/ogg">
        <source src="musique-nous-sommes-les-patates.wav" type="audio/wav">
    </audio>
    <script>
        // Stockage du nom d'utilisateur
// Supposons que vous récupérez le nom d'utilisateur via un prompt ou une autre méthode
let username = prompt("Veuillez entrer votre prénom ne vous inquéter pas ce ne sera pas sauvegarder 👻👻👻 :");

// Stockage dans le localStorage pour persistance
localStorage.setItem("// nom d'utilisateur", username);

// Fonction pour récupérer le nom d'utilisateur
function getUsername() {
    return localStorage.getItem("// nom d'utilisateur");
}

// Fonction pour proposer un emoji (par exemple, basé sur le nom ou aléatoirement)
function proposerEmoji() {
    const emojis = ["😊", "🎉", "🚀", "🌟", "🔥", "💡", "🎈", "🌈", "👻", "👾", "🍫", "💧", "🧩", "🍌", "💩", "👽"];
    // Vous pouvez personnaliser la logique ici, par exemple, en utilisant le nom pour choisir un emoji
    // Par exemple, basé sur la première lettre du nom
    const user = getUsername();
    if (user) {
        const firstLetter = user.charAt(0).toLowerCase();
        // Simple exemple : si la première lettre est une voyelle, proposer un emoji spécifique
        if ("aeiouy".includes(firstLetter)) {
            return "😊"; // emoji pour les voyelles
        } else {
            // Sinon, choisir un emoji aléatoire
            return emojis[Math.floor(Math.random() * emojis.length)];
        }
    } else {
        // Si pas de nom d'utilisateur, proposer un emoji aléatoire
        return emojis[Math.floor(Math.random() * emojis.length)];
    }
}

// Afficher l'emoji dans la page
const emoji = proposerEmoji();
document.body.innerHTML += `<p id="monid">Bonjour, ${getUsername()} ! Voici votre emoji : ${emoji}</p>`;
    </script>
