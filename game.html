<meta charset="UTF-8" />
<title>Jeu cliker - Emojiperso.com</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    cursor: cell;
    background-color: rgba(255, 247, 0, 0.619);
  }
  #score {
    font-size: 2em;
    margin: 20px 0;
  }
  button {
    padding: 10px 20px;
    font-size: 1em;
    margin: 10px;
    cursor: pointer;
  }
  #shop {
    margin-top: 30px;
  }
  *{
    margin:0px;
    padding:0px;
    box-sizing: border-box;
    font-family: sans-serif;
}
nav{
    width:100%;
    height:75px;
    background-color: #53698f;
    color: #fff;
    display: flex;
    justify-content:space-between;
    align-items: center;
    padding: 0px 50px;
    position: fixed;
    top: 0;
    z-index: 1;
}
.logo{
    font-size: 32px;
    font-weight: bold;
}
.menu{
    width: 65;
    display: flex;
    justify-content: right;
    list-style: none;
}
.menu li{
    margin-left: 20px;
}
.menu li a{
    font-size: 19px;
    color:#fff;
    text-decoration: none;
    transition: 0.3s ease;
}
.menu li a:hover{
    color:#ccc;
}

<body>
  <br>
  <br>
  <br>
  <br>

<h1>Jeu d'émoji</h1>
<div id="score">Score : 0</div>
<button id="clicker">😊</button>

<div id="shop">
  <h2>Améliorations</h2>
  <button id="upgrade1">Augmenter les points par clic (coût : 10)</button>
  <button id="upgrade2">Double le score (coût : 50)</button>
</div>

<nav>
      <div class="logo">Naviguer</div>
      <ul class="menu">
        <li><a href="tire.html">Acceuil.</a></li>
        <li><a href="emoji.html">Voir les émojis.</a></li>
    <h2></h2>
    <li><a href="credit.html">Crédits.</a></li>
    <h2></h2>
    <li><a href="iterface de jeu.html">Jeux.</a></li>
    <h2></h2>
    <li><a href="demo.html">Démo.</a></li>
    <h2></h2>
    <li><a href="emoji copy.html">Sets.</a></li>
    <h2></h2>
    <li><a href="disiener.html">Designer.</a></li>
    <h2></h2>
    <li><a href="myemoji.html">Mon émoji.</a></li>
      </ul>
    </nav>

<script>
  let score = 0;
  let pointsPerClick = 1;
  let doubleScore = false;

  const scoreDisplay = document.getElementById('score');
  const clickButton = document.getElementById('clicker');

  document.getElementById('upgrade1').addEventListener('click', () => {
    if (score >= 10) {
      score -= 10;
      pointsPerClick += 1;
      updateScore();
    } else {
      alert("Pas assez de points !");
    }
  });

  document.getElementById('upgrade2').addEventListener('click', () => {
    if (score >= 50 && !doubleScore) {
      score -= 50;
      doubleScore = true;
      updateScore();
    } else if (doubleScore) {
      alert("Déjà acheté !");
    } else {
      alert("Pas assez de points !");
    }
  });

  clickButton.addEventListener('click', () => {
    let pointsGagne = pointsPerClick;
    if (doubleScore) pointsGagne *= 2;
    score += pointsGagne;
    updateScore();
  });

  function updateScore() {
    scoreDisplay.textContent = 'Score : ' + score;
  }
</script>
</body>
</html>
