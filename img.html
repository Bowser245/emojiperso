<h2>Asistance Émojiperso</h2>
<div id="chatbox"></div>
<input type="text" id="userInput" placeholder="Posez votre question..." />

<script>
  const chatbox = document.getElementById('chatbox');
  const userInput = document.getElementById('userInput');
  

  const responses = {
    "qui a créer émojiperso ?": "Bonjour, la personne qui a créer émojiperso.com est Bowser245 sur beaucoup de jeux vidéos.",
    "quels sont les activités de émojiperso ?": "Bonjour, les activités de émojiperso.com sont Designer, Jeux, Mon émoji.",
    "?": "Bonjour, je suis la chat-bot d’assistance du site.",
    "c'est quoi mon émoji ?": "Bonjour, Mon émoji vous proposera un émoji entrez simplement votre prénom.",
    "comment utiliser designer ?": "Bonjour, il est vrai que Designer n'inclut pas de notice d'utilisation donc. Je vais vous expliquer : Designer est un service pour créer une image d'émoji personnalisée.",
    "combien il y a d'émoji sur émojiperso ?": "Bonjour, émojiperso.com contient 290 émojis précisément au dernier compte.",
    "combien il y a de services sur émojiperso ?": "Bonjour, émojiperso.com contient 8 services précisément au dernier compte.",
    "pourquoi émojiperso a été créé ?": "Bonjour, émojiperso.com a été créé pour permettre aux gens de s’exprimer avec nos émojis.",
    "en quel format est télécharger l'émoji de designer ?": "Bonjour, designer téléchargera l'émoji en format <.png> dans les téléchargement de votre navigateur si vous appuyez le bouton enregistrer.",
    "bug": "Bonjour, les bugs d'émojiperso qui sont là a cause du redimensionnement de fenètre qui d'ailleur n'éxiste pas causent un essai de redimensionement de la fenètre,(impossible) sur votre navigateur un autre bug du site est que si vous ne fremez pas l'onglet d'acceuil ou d'erreur beaucoup d'émoji (qui tombent du ciel) vont s'aglutiner et faire de la latence pendant environ 3 secondes.",
    "latence": "Bonjour, la latence sur émojiperso peut se faire en très grand quantitée si l'économiseur de battrie est activé : toute les pages du site seront ralentient."
  };

  function appendMessage(message, sender) {
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message ' + sender;
    messageDiv.textContent = message;
    chatbox.appendChild(messageDiv);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const question = userInput.value.trim().toLowerCase();
      if (question) {
        appendMessage(question, 'user');
        let answer = responses[question];
        if (!answer) {
          answer = "Désolé, je ne comprends pas cette question. Essayez de me poser un question a propos du site."; //ici le resultat si il ne truove pas de réponse
        }
        setTimeout(() => {
          appendMessage(answer, 'bot');
        }, 500);
        userInput.value = ''
      }
    }
  });
</script>
