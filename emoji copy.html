    <h1>Voici les sets</h1>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 0px;
        }
        .emoji-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .emoji {
            font-size: 50px;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s, transform 0.2s;
        }
        .emoji:hover {
            background-color: #e0e0e0;
            transform: scale(1.1);
        }
        #message {
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="emoji-container" id="emojiContainer">
        <!-- Les émojis seront insérés ici par JavaScript -->
    </div> 
    <div id="message"></div>

    <script>
        const emojis = ['😀😂', '😍💖', '🌟⭐', '🍕🍿', '🔥💧', '🚀👾', '🐶💩', '🎉🏷️', '🌈🏖️', '🤔🧩', '👽👻', '🍫🥨', '🎶📀', '🥭🍑', '🍉🍓', '🍎🍐'];
        const container = document.getElementById('emojiContainer');
        const messageDiv = document.getElementById('message');

        // Fonction pour créer et afficher les émojis
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji';
            span.textContent = emoji;
            span.title = 'Cliquez pour copier';
            span.onclick = () => {
                navigator.clipboard.writeText(emoji).then(() => {
                    alert(`Set "${emoji}" copié dans le presse-papiers !`);
                });
            };
            container.appendChild(span);
        });
    </script>
</body>
