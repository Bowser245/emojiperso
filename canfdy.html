  <h2>Devine le nombre entre 1 et 100</h2>
  <input type="number" id="guessInput" placeholder="Ton nombre" />
  <button onclick="verifier()">Vérifier</button>
  <p id="message"></p>

  <script>
    const nombreSecret = Math.floor(Math.random() * 100) + 1;
    let tentatives = 0;

    function verifier() {
      const guess = parseInt(document.getElementById('guessInput').value);
      const message = document.getElementById('message');
      tentatives++;
      if (guess === nombreSecret) {
        message.innerHTML = `Bravo ! Tu as trouvé en ${tentatives} tentatives.`;
      } else if (guess < nombreSecret) {
        message.innerHTML = 'C’est plus grand ! Essaie encore.';
      } else {
        message.innerHTML = 'C’est plus petit ! Essaie encore.';
      }
    }
  </script>
