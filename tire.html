    <script>
  const emojis = ['😊', '🎉', '🚀', '🌟', '🔥', '💖', '🎈', '🤖', '✨', '🌈'];
  
  function createEmoji() {
    const emoji = document.createElement('div');
    emoji.className = 'emoji';
    emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    emoji.style.left = Math.random() * 100 + 'vw';
    emoji.style.fontSize = (20 + Math.random() * 30) + 'px';
    emoji.style.animationDuration = (3 + Math.random() * 3) + 's';
    document.body.appendChild(emoji);
    
    // Supprimer l'emoji après la fin de l'animation
    emoji.addEventListener('animationend', () => {
      emoji.remove();
    });
  }
  const title = document.getElementById('title');

  // Ajoutez ou retirez l'effet glitch au clic
  title.addEventListener('click', () => {
    title.classList.toggle('glitch');
  });

  // Créer des émojis toutes les 300ms
  setInterval(createEmoji, 300);
</script>
<style>
  .emoji {
    position: absolute;
    font-size: 24px;
    top: -50px;
    user-select: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }
  #title {
    font-size: 3em;
    position: relative;
    cursor: pointer;
  }

  /* Effet glitch */
  h1.glitch {
    animation: glitch 1s infinite;
  }

  @keyframes glitch {
    0% {
      text-shadow: 2px 0 red, -2px 0 cyan;
    }
    20% {
      text-shadow: -2px 0 red, 2px 0 cyan;
    }
    40% {
      text-shadow: 2px 2px red, -2px -2px cyan;
    }
    60% {
      text-shadow: -2px -2px red, 2px 2px cyan;
    }
    80% {
      text-shadow: 0 0 red, 0 0 cyan;
    }
    100% {
      text-shadow: 2px 0 red, -2px 0 cyan;
    }
  }
</style>
